<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prompt Commerce Gateway</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="centered-wrap">
    <div class="card" style="max-width:480px;width:100%;text-align:center;">
      <div class="logo" style="font-size:2rem;margin-bottom:0.5rem;display:flex;justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon zap-icon"
          style="width:2.5rem;height:2.5rem;margin:0;">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">Prompt Commerce Gateway</h1>
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:2rem;">
        The AI catalog gateway for small retailers across Southeast Asia.
      </p>
      <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
        <a href="/register.html" class="btn btn-primary">Register Your Store</a>
        <a href="/admin.html" class="btn btn-secondary">Admin Login</a>
      </div>
      <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
        <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem;">Connect to Claude Desktop:</p>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem;font-size:0.78rem;color:#a8d8b9;text-align:left;">{
  "mcpServers": {
    "prompt-commerce": {
      "url": "https://your-gateway-url/sse"
    }
  }
}</pre>
      </div>
    </div>
  </div>
</body>
</html>
