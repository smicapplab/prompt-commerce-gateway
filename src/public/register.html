<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Commerce — Retailer Registration</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="centered-wrap">
    <div class="card" style="max-width:540px;width:100%;">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon zap-icon"
          style="width:1.4rem;height:1.4rem;">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>Prompt Commerce
      </div>
      <div class="tagline">Register your store on the AI catalog gateway</div>

      <div id="successBanner" class="alert alert-success" style="display:none;"></div>
      <div id="errorBanner" class="alert alert-error" style="display:none;"></div>

      <form id="regForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="name">Store Name <span class="req">*</span></label>
          <input id="name" name="name" type="text" placeholder="Steve's Sari-Sari Store" required />
        </div>

        <div class="form-group">
          <label for="slug">
            Store Slug <span class="req">*</span>
            <span class="hint">— URL-friendly, lowercase, no spaces</span>
          </label>
          <div style="display:flex;align-items:center;gap:0.4rem;">
            <span style="color:var(--muted);font-size:0.85rem;">prompt-commerce.io/store/</span>
            <input id="slug" name="slug" type="text" placeholder="steves-store" required
                   style="flex:1" pattern="[a-z0-9\-]+" />
          </div>
        </div>

        <div class="form-group">
          <label for="contactEmail">Contact Email <span class="req">*</span></label>
          <input id="contactEmail" name="contactEmail" type="email"
                 placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="mcpServerUrl">
            MCP Server URL <span class="req">*</span>
            <span class="hint">— public URL where your prompt-commerce instance is running</span>
          </label>
          <input id="mcpServerUrl" name="mcpServerUrl" type="url"
                 placeholder="http://your-vps-ip:3001" required />
        </div>

        <div class="form-group">
          <label for="businessPermit">
            Business Permit <span class="hint">— upload a photo or scan (max 5 MB)</span>
          </label>
          <input id="businessPermit" name="businessPermit" type="file"
                 accept="image/*,.pdf" />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.75rem;justify-content:center;">
          Submit Registration
        </button>
      </form>

      <p style="font-size:0.8rem;color:var(--muted);margin-top:1.25rem;text-align:center;">
        Once your business permit is verified, you'll receive your platform key by email.<br/>
        Paste it into your local <strong>prompt-commerce</strong> admin panel to go live.
      </p>
    </div>
  </div>

  <script>
    // Auto-generate slug from store name
    document.getElementById('name').addEventListener('input', (e) => {
      const slug = e.target.value
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .slice(0, 48);
      document.getElementById('slug').value = slug;
    });

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const success = document.getElementById('successBanner');
      const error = document.getElementById('errorBanner');
      success.style.display = 'none';
      error.style.display = 'none';

      const formData = new FormData(e.target);

      try {
        const res = await fetch('/api/register', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed.');
        
        window.location.href = '/confirmation.html';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
