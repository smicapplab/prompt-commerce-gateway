<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Delivery Address</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Prevent body scroll when keyboard opens in WebView */
    html, body { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .suggestion-item:last-child { border-bottom: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <div class="max-w-md mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center space-x-3 mb-6">
        <div class="bg-blue-100 p-2 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900">Delivery Address</h1>
      </div>

      <div class="space-y-4">
        <div class="relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">Search your address</label>
          <input id="address-input" type="text"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
            placeholder="Start typing (e.g. Rizal Street...)" autocomplete="off" autocorrect="off" spellcheck="false" />
          <!-- In-page suggestions — no pac-container / WebView clipping issues -->
          <div id="suggestions" class="hidden absolute left-0 right-0 mt-1 bg-white rounded-xl border border-gray-200 shadow-lg overflow-hidden z-50"></div>
          <p class="mt-2 text-xs text-gray-500">We use Google Places to find your exact location.</p>
        </div>

        <div id="details-section" class="hidden space-y-4 pt-4 border-t border-gray-100">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Unit / Floor / Building (Optional)</label>
            <input id="unit-input" type="text"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
              placeholder="e.g. Unit 12A, Floor 3" />
          </div>

          <div class="bg-blue-50 p-4 rounded-xl">
            <p class="text-xs font-semibold text-blue-800 uppercase tracking-wider mb-1">Selected Address</p>
            <p id="formatted-address" class="text-sm text-blue-900"></p>
          </div>
        </div>

        <button id="confirm-btn" disabled
          class="w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-colors shadow-lg shadow-blue-200 disabled:shadow-none mt-6">
          Confirm Delivery Location
        </button>

        <button id="cancel-btn" class="w-full py-2 text-sm text-gray-400 underline mt-4">
          Cancel — I'll type my address instead
        </button>
      </div>
    </div>
  </div>

  <!--
    Maps loaded last so DOM is ready.
    Using async + callback avoids any race between API init and inline script.
    NO Autocomplete widget — we use AutocompleteService + PlacesService directly
    so suggestions render in our own DOM (no pac-container WebView clipping).
  -->
  <script>
    const token   = '__TOKEN__';
    const channel = '__CHANNEL__';
    const apiKey  = '__API_KEY__';

    // Fix: define initMaps globally for the Google Maps callback
    window.initMaps = init;

    function showError(msg) {
      document.body.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
          <div class="bg-red-100 p-4 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">Something went wrong</h1>
          <p class="text-gray-600 mb-6">${msg}</p>
          <button onclick="location.reload()" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200">
            Try Again
          </button>
        </div>
      `;
    }

    // Improved API key validation
    const isApiKeyMissing = !apiKey || apiKey === '__' + 'API_KEY' + '__' || apiKey === '';
    
    if (isApiKeyMissing) {
      console.warn('Google Maps API Key is missing or invalid in address picker.');
      // Show error in UI for the user/admin to see
      setTimeout(() => {
        showError('Google Maps configuration is missing. Please add your API Key in the Seller Admin Settings.');
      }, 500);
    }
    
    let selectedPlace   = null;
    let AutocompleteSuggestion = null;
    let Place           = null;
    let sessionToken    = null;
    let debounceTimer   = null;

    const input          = document.getElementById('address-input');
    const unitInput      = document.getElementById('unit-input');
    const confirmBtn     = document.getElementById('confirm-btn');
    const detailsSection = document.getElementById('details-section');
    const formattedLabel = document.getElementById('formatted-address');
    const cancelBtn      = document.getElementById('cancel-btn');
    const suggestionsDiv = document.getElementById('suggestions');

    // Load libraries using the new loader
    async function init() {
      try {
        const { AutocompleteSessionToken, AutocompleteSuggestion: AS } = await google.maps.importLibrary("places");
        const { Place: P } = await google.maps.importLibrary("places");
        
        AutocompleteSuggestion = AS;
        Place = P;
        sessionToken = new AutocompleteSessionToken();
        console.log('Google Maps New Places Library loaded');
      } catch (err) {
        console.error('Failed to initialize Google Maps libraries:', err);
        // Don't show full error UI yet, maybe it's just a transient network issue
      }
    }

    // ── Suggestion rendering ─────────────────────────────────────────────────
    function showSuggestions(suggestions) {
      if (!suggestions || suggestions.length === 0) {
        suggestionsDiv.classList.add('hidden');
        return;
      }
      suggestionsDiv.innerHTML = suggestions.slice(0, 5).map(s => {
        const p = s.placePrediction;
        return `
        <div
          class="suggestion-item px-4 py-3 hover:bg-gray-50 active:bg-gray-100 cursor-pointer border-b border-gray-100 text-sm text-gray-800 flex items-start gap-2"
          data-place-id="${p.placeId}"
          data-description="${p.text.text.replace(/"/g, '&quot;')}"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mt-0.5 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          </svg>
          <span>${p.text.text}</span>
        </div>
      `}).join('');
      suggestionsDiv.classList.remove('hidden');
    }

    // ── Input handler (debounced) ────────────────────────────────────────────
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const query = input.value.trim();

      // Clear selection when user edits after picking
      selectedPlace = null;
      confirmBtn.disabled = true;
      detailsSection.classList.add('hidden');

      if (query.length < 2) {
        suggestionsDiv.classList.add('hidden');
        return;
      }

      if (!AutocompleteSuggestion) return;

      debounceTimer = setTimeout(async () => {
        try {
          const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
            input: query,
            includedRegionCodes: ['ph'],
            sessionToken,
          });
          showSuggestions(suggestions);
        } catch (err) {
          console.error('Autocomplete failed:', err);
          suggestionsDiv.classList.add('hidden');
        }
      }, 300);
    });

    // ── Suggestion click ─────────────────────────────────────────────────────
    suggestionsDiv.addEventListener('mousedown', handleSuggestionPick);
    suggestionsDiv.addEventListener('touchstart', handleSuggestionPick, { passive: false });
    suggestionsDiv.addEventListener('click', handleSuggestionPick);

    async function handleSuggestionPick(e) {
      const item = e.target.closest('.suggestion-item');
      if (!item) return;

      // Prevent the input blur from hiding the div before we can process the click
      if (e.type === 'mousedown' || e.type === 'touchstart') {
        e.preventDefault();
      }
      
      // If it's a click event, we process it. If mousedown/touchstart, we only prevent default 
      // to keep focus, but let the click event (which follows) do the work.
      // Actually, to be safe across all devices, let's process in all types but guard against double-processing.
      if (item.getAttribute('data-processing') === 'true') return;
      item.setAttribute('data-processing', 'true');
      setTimeout(() => item.removeAttribute('data-processing'), 500);

      const placeId     = item.dataset.placeId;
      const description = item.dataset.description;

      console.log('Suggestion picked:', { placeId, description });

      if (!Place) {
        console.error('Place library not loaded yet');
        return;
      }

      // Show selected text immediately
      input.value = description;
      suggestionsDiv.classList.add('hidden');

      try {
        console.log('Fetching details for:', placeId);
        const place = new Place({ id: placeId });
        await place.fetchFields({
          fields: ['addressComponents', 'location', 'formattedAddress'],
        });

        console.log('Details fetched:', place);

        // Rotate session token
        sessionToken = new google.maps.AutocompleteSessionToken();

        selectedPlace = place;
        input.value = place.formattedAddress;
        formattedLabel.textContent = place.formattedAddress;
        detailsSection.classList.remove('hidden');
        confirmBtn.disabled = false;
      } catch (err) {
        console.error('Fetch place details failed:', err);
        // Don't clear input here so the user can see what they picked even if details fail
      }
    }

    // Hide suggestions when input loses focus
    input.addEventListener('blur', () => {
      setTimeout(() => suggestionsDiv.classList.add('hidden'), 150);
    });

    // ── Address parser ───────────────────────────────────────────────────────
    function parsePlace(place, unit) {
      const components = place.addressComponents || [];
      const getComp = (type) => components.find(c => c.types.includes(type))?.longText || '';

      const streetNumber = getComp('street_number');
      const route        = getComp('route');
      const streetLine   = [unit, streetNumber, route].filter(Boolean).join(' ');

      return {
        streetLine:       streetLine || getComp('premise') || getComp('sublocality_level_3'),
        barangay:         getComp('sublocality_level_1') || getComp('sublocality'),
        city:             getComp('locality'),
        province:         getComp('administrative_area_level_2'),
        postalCode:       getComp('postal_code'),
        lat:              place.location.lat(),
        lng:              place.location.lng(),
        formattedAddress: place.formattedAddress,
      };
    }

    // ── Confirm ──────────────────────────────────────────────────────────────
    confirmBtn.addEventListener('click', async () => {
      if (!selectedPlace) return;

      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Processing...';

      const address = parsePlace(selectedPlace, unitInput.value.trim());
      const payload = { token, address };

      if (channel === 'telegram') {
        window.Telegram.WebApp.sendData(JSON.stringify(address));
        window.Telegram.WebApp.close();
      } else {
        try {
          const res = await fetch('/address-picker/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            document.body.innerHTML = `
              <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                <div class="bg-green-100 p-4 rounded-full mb-4">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Address Saved!</h1>
                <p class="text-gray-600">You can now close this tab and return to WhatsApp.</p>
              </div>
            `;
          } else {
            showError('Failed to save address. Please try again.');
          }
        } catch (err) {
          showError(err.message);
        }
      }
    });

    // ── Cancel ───────────────────────────────────────────────────────────────
    cancelBtn.addEventListener('click', () => {
      if (channel === 'telegram') {
        window.Telegram.WebApp.sendData(JSON.stringify({ cancelled: true }));
        window.Telegram.WebApp.close();
      } else {
        fetch('/address-picker/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, cancelled: true }),
        }).then(() => {
          document.body.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center bg-gray-50">
              <p class="text-gray-600 mb-6">You can now close this tab and type your address in the chat.</p>
              <button onclick="window.close()" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200">
                Close Tab
              </button>
            </div>
          `;
          setTimeout(() => window.close(), 1000);
        });
      }
    });

    // ── Telegram WebApp init ─────────────────────────────────────────────────
    if (channel === 'telegram') {
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.ready();
    }
  </script>

  <!-- Maps loaded async with callback — no race condition, no pac-container -->
  <script src="https://maps.googleapis.com/maps/api/js?key=__API_KEY__&libraries=places&callback=initMaps&loading=async" async defer></script>
</body>
</html>
